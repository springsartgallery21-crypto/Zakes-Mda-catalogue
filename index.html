<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exhibition Catalogue</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0;
            box-sizing: border-box;
            height: 100vh;
            width: 100%;
        }
        #viewport-container {
            width: 100%;
            height: 100vh; /* Expands to utilize full screen depth since internal controls handle paging */
            background-color: #111111;
            border: none;
            overflow: hidden;
        }
        .universal-pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="viewport-container">
            <!-- 
              High-Performance Cloud Document Streaming Frame.
              This processes the raw catalogue.pdf using Google's engine layout,
              making it scroll seamlessly like an interactive presentation book 
              on both desktop computers and all mobile screens.
            -->
            <iframe 
                class="universal-pdf-viewer" 
                src="https://google.com">
            </iframe>
        </div>
    </div>

</body>
</html>
